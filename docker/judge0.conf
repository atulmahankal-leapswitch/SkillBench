# Judge0 configuration (consumed by the judge0 server + workers services).
# See https://github.com/judge0/judge0/blob/master/judge0.conf for all options.

# Database
POSTGRES_HOST=judge0-db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0

# Redis
REDIS_HOST=judge0-redis
REDIS_PORT=6379

# Optional shared-secret auth. If set, also put it in .env as JUDGE0_AUTH_TOKEN
# and the backend will send it as the X-Auth-Token header.
# AUTHN_TOKEN=change-me

# Resource limits (sane defaults; tune per host)
MAX_CPU_TIME_LIMIT=15
MAX_WALL_TIME_LIMIT=20
MAX_MEMORY_LIMIT=512000
