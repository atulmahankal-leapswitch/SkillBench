# Development override: hot-reload, source bind mounts, exposed ports.
#   docker compose -f compose.yml -f compose.dev.yml up
name: skillbench

services:
  backend:
    build:
      target: dev
    environment:
      ENVIRONMENT: development
    # Apply migrations, then live-reload backend on source changes.
    command: ["sh", "-c", "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    volumes:
      - ./backend:/app
      # Keep the container's virtualenv from being shadowed by the bind mount.
      - /app/.venv
      # Host Claude Code login (shared): reuse the host's `claude login` so the
      # agent SDK authenticates via OAuth without an API key. The container runs
      # as root and can read the host's ~/.claude/.credentials.json.
      - "${CLAUDE_HOME:-${HOME}/.claude}:/root/.claude"

  # MinIO: S3-compatible object storage for dev (screen recordings). Configure
  # it in Settings → Recording (endpoint http://minio:9000). Prod uses real
  # object storage (R2/S3) instead.
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the recordings bucket then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set m http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin}; do sleep 1; done;
        mc mb -p m/${MINIO_BUCKET:-skillbench-recordings} || true;
        exit 0;

  frontend:
    build:
      target: dev
    environment:
      NODE_ENV: development
    command: ["pnpm", "dev"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  # In dev we usually hit the services directly on their host ports, so Caddy
  # is optional. Leave it running but it simply proxies localhost.

volumes:
  # Container-local Claude Code credentials (not the host's ~/.claude).
  claude-home:
  # MinIO object-storage data (dev screen recordings).
  minio-data:
